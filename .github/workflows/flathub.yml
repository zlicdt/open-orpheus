name: Publish to Flathub

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FLATHUB_REPO: flathub/io.github.yucling.open-orpheus
  FLATHUB_BASE_BRANCH: master

jobs:
  build-manifest:
    name: Generate Flatpak builder manifest
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Determine source tag and compute SHA256
        id: source
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "flatpak_source=${URL}+${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Install flatpak-node-generator and flatpak-cargo-generator
        run: |
          COMMIT=34ecf07ef4843f36b3078637ca13f1dbb1c2963a
          TOOLS_DIR=/tmp/flatpak-builder-tools
          git clone --filter=blob:none https://github.com/flatpak/flatpak-builder-tools.git "$TOOLS_DIR"
          git -C "$TOOLS_DIR" checkout "$COMMIT"

          # node generator: installs a proper CLI entry point
          pip3 install --user "$TOOLS_DIR/node"

          # cargo generator: install via poetry as documented, then create a launcher
          pip3 install --user poetry
          poetry -C "$TOOLS_DIR/cargo" install --no-interaction
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/flatpak-cargo-generator" << EOF
          #!/bin/sh
          exec poetry -C "$TOOLS_DIR/cargo" run python3 "$TOOLS_DIR/cargo/flatpak-cargo-generator.py" "\$@"
          EOF
          chmod +x "$HOME/.local/bin/flatpak-cargo-generator"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate Flatpak builder manifest
        env:
          FLATPAK_SOURCE: ${{ steps.source.outputs.flatpak_source }}
        run: node --experimental-strip-types scripts/build-flatpak-builder.mts

      - name: Upload manifest artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-builder
          path: out/make/flatpak-builder/

  publish:
    name: Create Flathub update PR
    needs: build-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Download manifest artifacts
        uses: actions/download-artifact@v8
        with:
          name: flatpak-builder
          path: flatpak-builder

      - name: Checkout Flathub repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.FLATHUB_REPO }}
          ref: ${{ env.FLATHUB_BASE_BRANCH }}
          token: ${{ secrets.FLATHUB_GITHUB_TOKEN }}
          path: flathub-repo

      - name: Copy generated files into Flathub repo
        run: |
          find flathub-repo -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -r flatpak-builder/. flathub-repo/

      - name: Create pull request in Flathub repository
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.FLATHUB_GITHUB_TOKEN }}
          path: flathub-repo
          branch: update/v${{ needs.build-manifest.outputs.version }}
          base: ${{ env.FLATHUB_BASE_BRANCH }}
          commit-message: Open Orpheus v${{ needs.build-manifest.outputs.version }}
          title: Open Orpheus v${{ needs.build-manifest.outputs.version }}
          body: |
            Automated Flathub manifest update for Open Orpheus v${{ needs.build-manifest.outputs.version }}.

            Source workflow run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          assignees: YUCLing
          delete-branch: false

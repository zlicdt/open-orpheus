name: Build Bundles

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        required: true
        type: string

jobs:
  build:
    name: Build on ${{ inputs.runner }}
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm build:modules

      - name: Install Flatpak dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder elfutils

      - name: Set up Flatpak runtimes
        if: runner.os == 'Linux'
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08 org.electronjs.Electron2.BaseApp//25.08

      - name: Build application bundles
        run: pnpm make

      - name: Upload flatpak
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-${{ inputs.runner }}
          path: out/make/flatpak/**
          if-no-files-found: ignore

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ inputs.runner }}
          path: out/make/deb/**
          if-no-files-found: ignore

      - name: Upload rpm
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ inputs.runner }}
          path: out/make/rpm/**
          if-no-files-found: ignore

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: AppImage-${{ inputs.runner }}
          path: out/make/AppImage/**
          if-no-files-found: ignore

      - name: Upload squirrel
        uses: actions/upload-artifact@v7
        with:
          name: squirrel-${{ inputs.runner }}
          path: out/make/squirrel.windows/**
          if-no-files-found: ignore

      - name: Upload zip
        uses: actions/upload-artifact@v7
        with:
          name: zip-${{ inputs.runner }}
          path: out/make/zip/**
          if-no-files-found: ignore
